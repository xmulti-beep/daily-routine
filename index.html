<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헬스 루틴 체크리스트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:20px;}
.container{max-width:700px;margin:0 auto;}
h1{font-size:18px;font-weight:500;margin-bottom:4px;color:#1a1a1a;}
.subtitle{font-size:12px;color:#888;margin-bottom:20px;}
.day-section{margin-bottom:20px;}
.day-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.day-lbl{font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:0.05em;}
.day-badge{font-size:10px;border-radius:20px;padding:2px 8px;}
.day-pct{font-size:12px;font-weight:500;margin-left:auto;}
.day-rst{font-size:11px;color:#aaa;background:none;border:0.5px solid #ddd;border-radius:6px;padding:2px 9px;cursor:pointer;margin-left:4px;}
.day-rst:hover{border-color:#bbb;color:#666;}
.prog-bar{height:4px;border-radius:2px;background:#e5e5e5;margin-bottom:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width 0.3s;}
.card{background:#fff;border:0.5px solid #e8e8e8;border-radius:12px;overflow:hidden;margin-bottom:8px;}
.card table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
.card thead tr{background:#f9f9f7;}
.card th{padding:7px 10px;text-align:left;font-weight:500;color:#888;font-size:11px;}
.card td{padding:9px 10px;border-top:0.5px solid #f0f0f0;vertical-align:middle;}
.card tr.done td{background:#f9f9f7;}
.card tr.done .ex-name{text-decoration:line-through;color:#bbb;}
.chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #ccc;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;background:#fff;}
.chk.on{background:#1D9E75;border-color:#1D9E75;}
.chk.on::after{content:"";display:block;width:4px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);margin-top:-2px;}
.ex-name{font-weight:500;color:#1a1a1a;}
.val{color:#888;text-align:center;}
.yt-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#cc3333;text-decoration:none;background:rgba(255,0,0,0.07);border-radius:6px;padding:3px 7px;white-space:nowrap;}
.yt-link:hover{background:rgba(255,0,0,0.13);}
.yt-dot{width:10px;height:10px;background:#f00;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.yt-tri{width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-left:5px solid #fff;margin-left:1px;}
.sec-lbl{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.04em;margin:8px 0 6px;}
.done-pill{display:none;font-size:11px;background:#E1F5EE;color:#085041;border-radius:20px;padding:2px 10px;font-weight:500;}
</style>
</head>
<body>
<div class="container">
  <h1>💪 헬스 루틴 체크리스트</h1>
  <p class="subtitle">준비운동 + 본운동 모두 체크하면 100%</p>
  <div id="app"></div>
</div>

<script>
var WARM=[
  {name:"Cat-Cow",time:"3분",url:"https://www.youtube.com/watch?v=kqnua4rHVVA"},
  {name:"맥길 컬업",time:"3분",url:"https://www.youtube.com/watch?v=GsNV0UCLRrU"},
  {name:"사이드 플랭크",time:"2.5분",url:"https://www.youtube.com/watch?v=Xpej0_byiqQ"},
  {name:"버드독",time:"2.5분",url:"https://www.youtube.com/watch?v=r3n2oizl1Yg"},
  {name:"장요근 스트레칭",time:"7분",url:"https://www.youtube.com/watch?v=YqF8GBdOeHw"}
];
var DAYS=[
  {id:"mon",label:"월요일 — 하체",badge:"Leg Day",dc:"#378ADD",bb:"#E6F1FB",bc:"#0C447C",
   ex:[
    {name:"레그 프레스",kg:"12kg",reps:"4회",sets:"2세트",url:"https://www.youtube.com/watch?v=GvRgijoJ2xY"},
    {name:"레그 익스텐션",kg:"15kg",reps:"5회",sets:"3세트",url:"https://www.youtube.com/watch?v=YyvSfVjQeL0"},
    {name:"레그 컬",kg:"15kg",reps:"5회",sets:"3세트",url:"https://www.youtube.com/watch?v=ELOCsoDSmrg"},
    {name:"데드 버그",kg:"—",reps:"10회",sets:"3세트",url:"https://www.youtube.com/watch?v=4XLEnwUr1d8"}
  ]},
  {id:"wed",label:"수요일 — 상체",badge:"Upper Day",dc:"#D4537E",bb:"#FBEAF0",bc:"#72243E",
   ex:[
    {name:"체스트 프레스 머신",kg:"12kg",reps:"4회",sets:"2세트",url:"https://www.youtube.com/watch?v=xUm0BiZCWlQ"},
    {name:"시티드 케이블 로우",kg:"12kg",reps:"4회",sets:"2세트",url:"https://www.youtube.com/watch?v=GZbfZ033f74"},
    {name:"렛 풀 다운",kg:"12kg",reps:"4회",sets:"2세트",url:"https://www.youtube.com/watch?v=CAwf7n6Luuc"},
    {name:"사이드 플랭크",kg:"—",reps:"30초",sets:"3세트",url:"https://www.youtube.com/watch?v=Xpej0_byiqQ"}
  ]},
  {id:"fri",label:"금요일 — 전신·하체",badge:"Full Day",dc:"#1D9E75",bb:"#E1F5EE",bc:"#085041",
   ex:[
    {name:"와이드 스쿼트",kg:"15kg",reps:"4회",sets:"2세트",url:"https://www.youtube.com/watch?v=aclHkVaku9U"},
    {name:"시티드 케이블 로우",kg:"12kg",reps:"3회",sets:"2세트",url:"https://www.youtube.com/watch?v=GZbfZ033f74"},
    {name:"플랭크",kg:"—",reps:"45초",sets:"3세트",url:"https://www.youtube.com/watch?v=pSHjTRCQxIw"},
    {name:"힙 브릿지",kg:"15kg",reps:"3회",sets:"3세트",url:"https://www.youtube.com/watch?v=wPM8icPu6H8"}
  ]}
];

var checks={};
DAYS.forEach(function(d){
  checks[d.id]=[];
  for(var i=0;i<WARM.length+d.ex.length;i++)checks[d.id].push(false);
});

function toggle(dayId,idx){
  checks[dayId][idx]=!checks[dayId][idx];
  var key=dayId+"_"+idx;
  var chk=document.getElementById("chk_"+key);
  var row=document.getElementById("row_"+key);
  if(checks[dayId][idx]){if(chk)chk.classList.add("on");if(row)row.classList.add("done");}
  else{if(chk)chk.classList.remove("on");if(row)row.classList.remove("done");}
  updateProg(dayId);
}

function updateProg(dayId){
  var arr=checks[dayId];
  var done=arr.filter(Boolean).length;
  var pct=arr.length>0?Math.round(done/arr.length*100):0;
  var fill=document.getElementById("fill_"+dayId);
  var pctEl=document.getElementById("pct_"+dayId);
  var pill=document.getElementById("pill_"+dayId);
  if(fill)fill.style.width=pct+"%";
  if(pctEl)pctEl.textContent=pct+"%";
  if(pill)pill.style.display=pct===100?"inline-flex":"none";
}

function resetDay(dayId){
  checks[dayId]=checks[dayId].map(function(){return false;});
  var total=WARM.length+DAYS.find(function(d){return d.id===dayId;}).ex.length;
  for(var i=0;i<total;i++){
    var c=document.getElementById("chk_"+dayId+"_"+i);if(c)c.classList.remove("on");
    var r=document.getElementById("row_"+dayId+"_"+i);if(r)r.classList.remove("done");
  }
  updateProg(dayId);
}

function ytBtn(url){
  return '<a class="yt-link" href="'+url+'" target="_blank"><div class="yt-dot"><div class="yt-tri"></div></div>영상 보기</a>';
}

function chkCell(dayId,idx){
  return '<td style="width:32px;"><div class="chk" id="chk_'+dayId+'_'+idx+'" onclick="toggle(\''+dayId+'\','+idx+')"></div></td>';
}

function render(){
  var html="";
  DAYS.forEach(function(day){
    html+='<div class="day-section">';
    html+='<div class="day-header">';
    html+='<div class="day-dot" style="background:'+day.dc+'"></div>';
    html+='<div class="day-lbl">'+day.label+'</div>';
    html+='<div class="day-badge" style="background:'+day.bb+';color:'+day.bc+'">'+day.badge+'</div>';
    html+='<span class="done-pill" id="pill_'+day.id+'">완료!</span>';
    html+='<div class="day-pct" style="color:'+day.dc+'" id="pct_'+day.id+'">0%</div>';
    html+='<button class="day-rst" onclick="resetDay(\''+day.id+'\')">↺ 초기화</button>';
    html+='</div>';
    html+='<div class="prog-bar"><div class="prog-fill" id="fill_'+day.id+'" style="width:0%;background:'+day.dc+'"></div></div>';

    html+='<div class="sec-lbl">준비운동</div>';
    html+='<div class="card"><table>';
    html+='<thead><tr><th style="width:32px;"></th><th style="width:38%;">운동</th><th style="width:16%;text-align:center;">시간</th><th>영상</th></tr></thead><tbody>';
    WARM.forEach(function(ex,i){
      html+='<tr id="row_'+day.id+'_'+i+'">'+chkCell(day.id,i)+'<td class="ex-name">'+ex.name+'</td><td class="val">'+ex.time+'</td><td>'+ytBtn(ex.url)+'</td></tr>';
    });
    html+='</tbody></table></div>';

    html+='<div class="sec-lbl">본운동</div>';
    html+='<div class="card"><table>';
    html+='<thead><tr><th style="width:32px;"></th><th style="width:30%;">운동</th><th style="width:12%;text-align:center;">중량</th><th style="width:10%;text-align:center;">횟수</th><th style="width:10%;text-align:center;">세트</th><th>영상</th></tr></thead><tbody>';
    day.ex.forEach(function(ex,i){
      var idx=WARM.length+i;
      html+='<tr id="row_'+day.id+'_'+idx+'">'+chkCell(day.id,idx)+'<td class="ex-name">'+ex.name+'</td><td class="val">'+ex.kg+'</td><td class="val">'+ex.reps+'</td><td class="val">'+ex.sets+'</td><td>'+ytBtn(ex.url)+'</td></tr>';
    });
    html+='</tbody></table></div>';
    html+='</div>';
  });
  document.getElementById("app").innerHTML=html;
}
render();
</script>
</body>
</html>
