<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Routine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0ede8;--muted:#666;--muted2:#3a3a3a;
  --mon:#4a9eff;--wed:#e05c8a;--fri:#2ec98e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

.site-header{
  padding:48px 32px 28px;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,13,0.94);backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;
}
.header-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,76px);letter-spacing:0.04em;color:#f5f0e8;line-height:1;}
.day-tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;align-items:flex-end;}
.day-tab{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  padding:7px 16px;border-radius:3px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;
}
.day-tab:hover{color:var(--text);border-color:rgba(255,255,255,0.3);}
.day-tab.a-mon{color:var(--mon);border-color:var(--mon);background:rgba(74,158,255,0.08);}
.day-tab.a-wed{color:var(--wed);border-color:var(--wed);background:rgba(224,92,138,0.08);}
.day-tab.a-fri{color:var(--fri);border-color:var(--fri);background:rgba(46,201,142,0.08);}

.main{padding:0 32px;max-width:1100px;margin:0 auto;}
.day-sec{display:none;padding-top:40px;}
.day-sec.vis{display:block;}

.day-hero{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.day-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,5vw,52px);letter-spacing:0.06em;line-height:1;}
.day-badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:4px 11px;border-radius:2px;text-transform:uppercase;}
.pct-wrap{margin-left:auto;display:flex;align-items:center;gap:10px;}
.day-pct{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;transition:color 0.3s;min-width:44px;text-align:right;}
.done-pill{
  display:none;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  padding:4px 11px;border-radius:2px;background:rgba(46,201,142,0.12);color:var(--fri);border:1px solid rgba(46,201,142,0.28);
}
.rst-btn{
  font-family:'DM Mono',monospace;font-size:10px;background:none;
  border:1px solid var(--border2);color:var(--muted);padding:5px 12px;
  border-radius:3px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.06em;
}
.rst-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.3);}

.prog-track{height:2px;background:var(--border);border-radius:1px;margin-bottom:36px;overflow:hidden;}
.prog-fill{height:100%;border-radius:1px;width:0%;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);}

.block{margin-bottom:28px;}
.blk-label{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:10px;
}
.blk-label::after{content:'';flex:1;height:1px;background:var(--border);}

.ex-table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.ex-table th{
  padding:10px 14px;text-align:left;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);font-weight:400;
}
.ex-table td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle;background:var(--surface);transition:background 0.15s;}
.ex-table tr:last-child td{border-bottom:none;}
.ex-table tr:hover td{background:var(--surface2);}
.ex-table tr.done td{background:rgba(255,255,255,0.018);}
.ex-table tr.done .ex-name{text-decoration:line-through;color:var(--muted2);}
.ex-table tr.done .val,.ex-table tr.done .tip{color:var(--muted2);}

.ex-name{font-weight:500;font-size:13px;color:var(--text);}
.val{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-align:center;}
.tip{font-size:11px;color:var(--muted);line-height:1.5;}

.chk{
  width:18px;height:18px;border-radius:3px;border:1.5px solid var(--muted2);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.15s;background:transparent;
}
.chk:hover{border-color:rgba(255,255,255,0.4);}
.chk.on{border-color:var(--cc,#2ec98e);background:var(--cc,#2ec98e);}
.chk.on::after{
  content:'';display:block;width:4px;height:8px;
  border:2px solid #0d0d0d;border-top:none;border-left:none;
  transform:rotate(45deg);margin-top:-2px;
}

.yt-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;
  color:#cc4444;text-decoration:none;
  background:rgba(255,0,0,0.07);border:1px solid rgba(255,0,0,0.15);
  border-radius:3px;padding:4px 9px;white-space:nowrap;transition:all 0.15s;
}
.yt-btn:hover{background:rgba(255,0,0,0.13);border-color:rgba(255,0,0,0.3);}
.yt-icon{width:10px;height:10px;background:#ff2222;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.yt-tri{width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-left:5px solid #fff;margin-left:1px;}

@media(max-width:640px){
  .site-header{padding:28px 16px 18px;}
  .main{padding:0 16px;}
  .tip{display:none;}
  .ex-table th:nth-child(6),.ex-table td:nth-child(6){display:none;}
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="header-eyebrow">디스크 재활 · 근력 강화 프로그램</div>
    <div class="header-title">Weekly Routine</div>
  </div>
  <div class="day-tabs">
    <button class="day-tab" id="tab-mon" onclick="showDay('mon')">월 · Leg</button>
    <button class="day-tab" id="tab-wed" onclick="showDay('wed')">수 · Upper</button>
    <button class="day-tab" id="tab-fri" onclick="showDay('fri')">금 · Full</button>
  </div>
</header>

<main class="main">

  <section class="day-sec" id="sec-mon">
    <div class="day-hero">
      <div class="day-title" style="color:var(--mon)">Monday</div>
      <div class="day-badge" style="background:rgba(74,158,255,0.1);color:var(--mon);border:1px solid rgba(74,158,255,0.22)">하체 강화</div>
      <div class="pct-wrap">
        <span class="done-pill" id="pill-mon">Complete</span>
        <span class="day-pct" id="pct-mon" style="color:var(--mon)">0%</span>
        <button class="rst-btn" onclick="resetDay('mon')">Reset</button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="fill-mon" style="background:var(--mon)"></div></div>
    <div class="block"><div class="blk-label">준비운동</div><table class="ex-table" id="tw-mon"></table></div>
    <div class="block"><div class="blk-label">본운동</div><table class="ex-table" id="tm-mon"></table></div>
  </section>

  <section class="day-sec" id="sec-wed">
    <div class="day-hero">
      <div class="day-title" style="color:var(--wed)">Wednesday</div>
      <div class="day-badge" style="background:rgba(224,92,138,0.1);color:var(--wed);border:1px solid rgba(224,92,138,0.22)">상체 강화</div>
      <div class="pct-wrap">
        <span class="done-pill" id="pill-wed">Complete</span>
        <span class="day-pct" id="pct-wed" style="color:var(--wed)">0%</span>
        <button class="rst-btn" onclick="resetDay('wed')">Reset</button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="fill-wed" style="background:var(--wed)"></div></div>
    <div class="block"><div class="blk-label">준비운동</div><table class="ex-table" id="tw-wed"></table></div>
    <div class="block"><div class="blk-label">본운동</div><table class="ex-table" id="tm-wed"></table></div>
  </section>

  <section class="day-sec" id="sec-fri">
    <div class="day-hero">
      <div class="day-title" style="color:var(--fri)">Friday</div>
      <div class="day-badge" style="background:rgba(46,201,142,0.1);color:var(--fri);border:1px solid rgba(46,201,142,0.22)">전신 · 하체</div>
      <div class="pct-wrap">
        <span class="done-pill" id="pill-fri">Complete</span>
        <span class="day-pct" id="pct-fri" style="color:var(--fri)">0%</span>
        <button class="rst-btn" onclick="resetDay('fri')">Reset</button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="fill-fri" style="background:var(--fri)"></div></div>
    <div class="block"><div class="blk-label">준비운동</div><table class="ex-table" id="tw-fri"></table></div>
    <div class="block"><div class="blk-label">본운동</div><table class="ex-table" id="tm-fri"></table></div>
  </section>

</main>

<script>
var WARM=[
  {name:"Cat-Cow",val:"3분",tip:"고양이 소 자세",url:"https://www.youtube.com/watch?v=kqnua4rHVVA"},
  {name:"맥길 컬업",val:"3분",tip:"맥길 빅3",url:"https://www.youtube.com/watch?v=GsNV0UCLRrU"},
  {name:"사이드 플랭크",val:"2.5분",tip:"맥길 빅3",url:"https://www.youtube.com/watch?v=Xpej0_byiqQ"},
  {name:"버드독",val:"2.5분",tip:"맥길 빅3",url:"https://www.youtube.com/watch?v=r3n2oizl1Yg"},
  {name:"장요근 스트레칭",val:"7분",tip:"고관절 이완",url:"https://www.youtube.com/watch?v=YqF8GBdOeHw"}
];
var MAIN={
  mon:[
    {name:"레그 프레스",kg:"12kg",reps:"4회",sets:"2세트",tip:"발을 판 위쪽 · 허리 밀착",url:"https://www.youtube.com/watch?v=GvRgijoJ2xY"},
    {name:"레그 익스텐션",kg:"15kg",reps:"5회",sets:"3세트",tip:"허벅지 앞쪽 강화",url:"https://www.youtube.com/watch?v=YyvSfVjQeL0"},
    {name:"레그 컬",kg:"15kg",reps:"5회",sets:"3세트",tip:"허벅지 뒤쪽 · 척추 지지력",url:"https://www.youtube.com/watch?v=ELOCsoDSmrg"},
    {name:"데드 버그",kg:"—",reps:"10회",sets:"3세트",tip:"복압 유지 훈련",url:"https://www.youtube.com/watch?v=4XLEnwUr1d8"}
  ],
  wed:[
    {name:"체스트 프레스 머신",kg:"12kg",reps:"4회",sets:"2세트",tip:"등받이에 허리 밀착",url:"https://www.youtube.com/watch?v=xUm0BiZCWlQ"},
    {name:"시티드 케이블 로우",kg:"12kg",reps:"4회",sets:"2세트",tip:"상체 과신전 금지",url:"https://www.youtube.com/watch?v=GZbfZ033f74"},
    {name:"렛 풀 다운",kg:"12kg",reps:"4회",sets:"2세트",tip:"수직으로 당기며 척추 정렬",url:"https://www.youtube.com/watch?v=CAwf7n6Luuc"},
    {name:"사이드 플랭크",kg:"—",reps:"30초",sets:"3세트",tip:"측면 코어 강화",url:"https://www.youtube.com/watch?v=Xpej0_byiqQ"}
  ],
  fri:[
    {name:"와이드 스쿼트",kg:"15kg",reps:"4회",sets:"2세트",tip:"발 넓게 · 고관절 가동성",url:"https://www.youtube.com/watch?v=aclHkVaku9U"},
    {name:"시티드 케이블 로우",kg:"12kg",reps:"3회",sets:"2세트",tip:"중량 낮춰 자세 집중",url:"https://www.youtube.com/watch?v=GZbfZ033f74"},
    {name:"플랭크",kg:"—",reps:"45초",sets:"3세트",tip:"엉덩이 처지지 않게",url:"https://www.youtube.com/watch?v=pSHjTRCQxIw"},
    {name:"힙 브릿지",kg:"15kg",reps:"3회",sets:"3세트",tip:"엉덩이 강화 · 허리 통증 완화",url:"https://www.youtube.com/watch?v=wPM8icPu6H8"}
  ]
};

var COLOR={mon:"#4a9eff",wed:"#e05c8a",fri:"#2ec98e"};
var checks={mon:[],wed:[],fri:[]};

function yt(url){
  return '<a class="yt-btn" href="'+url+'" target="_blank"><div class="yt-icon"><div class="yt-tri"></div></div>영상</a>';
}

function chk(dayId,idx){
  var cc=COLOR[dayId];
  return '<div class="chk" id="c-'+dayId+'-'+idx+'" style="--cc:'+cc+'" onclick="toggle(\''+dayId+'\','+idx+')"></div>';
}

function buildWarm(dayId){
  var h='<thead><tr>'
    +'<th style="width:30px"></th>'
    +'<th>운동</th>'
    +'<th style="width:80px;text-align:center">시간</th>'
    +'<th style="width:180px">포인트</th>'
    +'<th style="width:80px">영상</th>'
    +'</tr></thead><tbody>';
  WARM.forEach(function(ex,i){
    checks[dayId][i]=false;
    h+='<tr id="r-'+dayId+'-'+i+'">'
      +'<td>'+chk(dayId,i)+'</td>'
      +'<td class="ex-name">'+ex.name+'</td>'
      +'<td class="val">'+ex.val+'</td>'
      +'<td class="tip">'+ex.tip+'</td>'
      +'<td>'+yt(ex.url)+'</td>'
      +'</tr>';
  });
  document.getElementById('tw-'+dayId).innerHTML=h+'</tbody>';
}

function buildMain(dayId){
  var off=WARM.length;
  var h='<thead><tr>'
    +'<th style="width:30px"></th>'
    +'<th>운동</th>'
    +'<th style="width:70px;text-align:center">중량</th>'
    +'<th style="width:60px;text-align:center">횟수</th>'
    +'<th style="width:70px;text-align:center">세트</th>'
    +'<th style="width:180px">포인트</th>'
    +'<th style="width:80px">영상</th>'
    +'</tr></thead><tbody>';
  MAIN[dayId].forEach(function(ex,i){
    var idx=off+i;
    checks[dayId][idx]=false;
    h+='<tr id="r-'+dayId+'-'+idx+'">'
      +'<td>'+chk(dayId,idx)+'</td>'
      +'<td class="ex-name">'+ex.name+'</td>'
      +'<td class="val">'+ex.kg+'</td>'
      +'<td class="val">'+ex.reps+'</td>'
      +'<td class="val">'+ex.sets+'</td>'
      +'<td class="tip">'+ex.tip+'</td>'
      +'<td>'+yt(ex.url)+'</td>'
      +'</tr>';
  });
  document.getElementById('tm-'+dayId).innerHTML=h+'</tbody>';
}

function toggle(dayId,idx){
  checks[dayId][idx]=!checks[dayId][idx];
  var c=document.getElementById('c-'+dayId+'-'+idx);
  var r=document.getElementById('r-'+dayId+'-'+idx);
  if(checks[dayId][idx]){c.classList.add('on');r.classList.add('done');}
  else{c.classList.remove('on');r.classList.remove('done');}
  updateProg(dayId);
}

function updateProg(dayId){
  var arr=checks[dayId];
  var done=arr.filter(Boolean).length;
  var pct=arr.length?Math.round(done/arr.length*100):0;
  document.getElementById('fill-'+dayId).style.width=pct+'%';
  document.getElementById('pct-'+dayId).textContent=pct+'%';
  document.getElementById('pill-'+dayId).style.display=pct===100?'inline-flex':'none';
}

function resetDay(dayId){
  var total=checks[dayId].length;
  for(var i=0;i<total;i++){
    checks[dayId][i]=false;
    var c=document.getElementById('c-'+dayId+'-'+i);if(c)c.classList.remove('on');
    var r=document.getElementById('r-'+dayId+'-'+i);if(r)r.classList.remove('done');
  }
  updateProg(dayId);
}

function showDay(dayId){
  ['mon','wed','fri'].forEach(function(d){
    document.getElementById('sec-'+d).classList.remove('vis');
    document.getElementById('tab-'+d).className='day-tab';
  });
  document.getElementById('sec-'+dayId).classList.add('vis');
  document.getElementById('tab-'+dayId).className='day-tab a-'+dayId;
}

['mon','wed','fri'].forEach(function(d){buildWarm(d);buildMain(d);});
showDay('mon');
</script>
</body>
</html>
